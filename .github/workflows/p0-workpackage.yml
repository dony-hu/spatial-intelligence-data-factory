name: p0-workpackage

on:
  pull_request:
    paths:
      - "workpackage_schema/**"
      - "workpackages/README.md"
      - "scripts/run_p0_workpackage.py"
      - "scripts/run_line_feedback_ci_block_demo.py"
      - "Makefile"
      - "scripts/check_workpackage_cleanup.sh"
      - "tests/test_workpackage_v1_cleanup_guard.py"
      - "tests/test_workpackage_blueprint_schema_versioning.py"
      - "tests/test_workpackage_schema_address_case_example.py"
      - "tests/test_workpackage_schema_companion_artifacts.py"
      - "tests/test_run_p0_workpackage.py"
      - ".github/workflows/p0-workpackage.yml"
  push:
    branches: ["main"]
    paths:
      - "workpackage_schema/**"
      - "workpackages/README.md"
      - "scripts/run_p0_workpackage.py"
      - "scripts/run_line_feedback_ci_block_demo.py"
      - "Makefile"
      - "scripts/check_workpackage_cleanup.sh"
      - "tests/test_workpackage_v1_cleanup_guard.py"
      - "tests/test_workpackage_blueprint_schema_versioning.py"
      - "tests/test_workpackage_schema_address_case_example.py"
      - "tests/test_workpackage_schema_companion_artifacts.py"
      - "tests/test_run_p0_workpackage.py"
      - ".github/workflows/p0-workpackage.yml"

jobs:
  p0-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-governance.txt
          python -m pip install pytest
      - name: Runtime baseline check
        run: python --version
      - name: Run workpackage cleanup gate
        run: ./scripts/check_workpackage_cleanup.sh
