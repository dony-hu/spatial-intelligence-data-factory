version: "v1"
framework: "bmad"
status: "active"
initialized_at: "2026-03-06"
scope: "project-and-theme"
canonical_sources:
  docs_entry: "docs/00_阅读指南.md"
  architecture_entry: "docs/02_总体架构/架构索引.md"
  doc_tiering_index: "docs/99_研发过程管理/文档分层索引.yaml"
  workflow_status: "docs/99_研发过程管理/工作流状态.yaml"
  process_root: "docs/99_研发过程管理"
  repo_policy: "AGENTS.md"
working_roots:
  method_assets: "_bmad/"
  generated_artifacts: "_bmad-output/"
  quick_reference: "docs/99_研发过程管理/BMAD快捷入口.md"
workflow_mapping:
  create-product-brief:
    canonical_targets:
      - "docs/01_产品与业务/产品简述.md"
    working_targets:
      - "_bmad-output/planning-artifacts/"
  create-prd:
    canonical_targets:
      - "docs/01_产品与业务/产品需求文档.md"
    working_targets:
      - "_bmad-output/planning-artifacts/"
  create-architecture:
    canonical_targets:
      - "docs/02_总体架构/架构索引.md"
      - "docs/02_总体架构/系统总体架构图.md"
      - "docs/02_总体架构/系统总览.md"
      - "docs/02_总体架构/数据工厂技术架构.md"
      - "docs/02_总体架构/系统分层设计.md"
      - "docs/02_总体架构/模块边界.md"
      - "docs/02_总体架构/依赖关系.md"
      - "docs/02_总体架构/核心设计原则.md"
    working_targets:
      - "_bmad-output/planning-artifacts/architecture.md"
  create-epics-and-stories:
    canonical_targets:
      - "docs/99_研发过程管理/<主题>/主题说明.md"
      - "docs/99_研发过程管理/<主题>/故事/*.md"
    working_targets:
      - "_bmad-output/implementation-artifacts/"
  sprint-planning:
    canonical_targets:
      - "docs/99_研发过程管理/冲刺计划.md"
      - "docs/99_研发过程管理/<主题>/冲刺计划.md"
    working_targets:
      - "_bmad-output/implementation-artifacts/"
  code-review:
    canonical_targets:
      - "docs/99_研发过程管理/<主题>/评审记录.md"
    working_targets:
      - "_bmad-output/implementation-artifacts/"
  retrospective:
    canonical_targets:
      - "docs/99_研发过程管理/<主题>/复盘记录.md"
    working_targets:
      - "_bmad-output/implementation-artifacts/"
  workflow-status:
    canonical_targets:
      - "docs/99_研发过程管理/工作流状态.yaml"
planned_docs:
  direct_owner:
    - path: "docs/03_数据处理工艺/数据处理总流程.md"
      trigger_workflow: "create-architecture"
      status: "planned"
    - path: "docs/07_系统运行与运维/系统部署架构.md"
      trigger_workflow: "create-architecture"
      status: "planned"
    - path: "docs/10_研发与工程规范/代码规范.md"
      trigger_workflow: "create-prd"
      status: "planned"
    - path: "docs/10_研发与工程规范/版本管理策略.md"
      trigger_workflow: "create-prd"
      status: "planned"
    - path: "docs/11_附录/常见问题.md"
      trigger_workflow: "retrospective"
      status: "planned"
  shared_with_speckit:
    - path: "docs/03_数据处理工艺/地址标准化工艺.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化规则、流程、任务和契约"
      status: "planned"
    - path: "docs/03_数据处理工艺/地址真实性核验工艺.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化规则、流程、任务和契约"
      status: "planned"
    - path: "docs/03_数据处理工艺/空间实体治理工艺.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化规则、流程、任务和契约"
      status: "planned"
    - path: "docs/03_数据处理工艺/多源数据融合工艺.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化规则、流程、任务和契约"
      status: "planned"
    - path: "docs/08_AI能力设计/检索与召回机制.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化算法策略、接口和评测任务"
      status: "planned"
    - path: "docs/08_AI能力设计/推理与排序策略.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化算法策略、接口和评测任务"
      status: "planned"
    - path: "docs/08_AI能力设计/模型评估机制.md"
      bmad_responsibility: "定义主题边界、业务目标、验收口径"
      speckit_responsibility: "细化评估框架、指标和任务"
      status: "planned"
handoff_to_speckit:
  required_fields:
    - "theme_id"
    - "story_id"
    - "story_path"
    - "acceptance_path"
    - "canonical_context_paths"
  target_root: "specs/<feature-id>/"
governance:
  single_truth_rule: "编号目录和研发主题目录是正式真相源，_bmad-output 仅保留过程和证据。"
  promotion_rule: "BMAD 过程产物稳定后，优先回写 docs 正式文档，再保留 _bmad-output 证据副本。"
  routing_rule: "BMAD 输出落点必须先服从 AGENTS.md，再服从 docs/99_研发过程管理/文档分层索引.yaml 的 Ring 分层与任务路由规则。"
