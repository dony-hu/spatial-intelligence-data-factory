version: "v1"
status: "active"
updated_at: "2026-03-07"
owner: "architecture+tech-writer"
purpose: "定义数据工厂项目文档的 Ring0~Ring3 分层规则、默认落点、关键例外和升降级路径。"

ai_coding_enforcement:
  enabled: true
  objective: "让后续 Codex、BMAD、SpecKit 等 AI Coding 任务在开始前先完成文档分层判定，再决定读取范围、写入落点和回填动作。"
  applies_to:
    - "Codex"
    - "BMAD"
    - "SpecKit"
    - "任何仓库内 AI Coding 协作流程"
  authority_order:
    - "AGENTS.md"
    - "docs/99_研发过程管理/文档分层索引.yaml"
    - "docs/00_阅读指南.md"
    - "docs/02_总体架构/架构索引.md"
    - "主题目录或 Story 上下文"
  mandatory_preflight:
    doc_change:
      read_first:
        - "AGENTS.md"
        - "docs/00_阅读指南.md"
        - "docs/99_研发过程管理/文档分层索引.yaml"
      must_decide:
        - "当前任务产物属于 Ring0、Ring1、Ring2 还是 Ring3。"
        - "目标文件是更新现有 canonical 文件，还是仅允许写入过程目录或归档目录。"
    code_change:
      read_first:
        - "AGENTS.md"
        - "docs/02_总体架构/架构索引.md"
        - "docs/10_研发与工程规范/项目目录结构.md"
        - "docs/99_研发过程管理/文档分层索引.yaml"
      must_decide:
        - "本次代码改动会不会改变正式产品、架构、测试或数据边界。"
        - "若会改变正式边界，哪些 Ring1 文档必须同步更新。"
        - "若只是当前研发主题推进，哪些 Ring2 主题文件需要同步更新。"
  parallel_development:
    enabled: true
    read_first:
      - "AGENTS.md"
      - "docs/10_研发与工程规范/多Agent与多Worktree并行开发规范.md"
      - "docs/99_研发过程管理/文档分层索引.yaml"
    default_trunk: "main"
    branch_prefix: "codex/"
    recommended_worktree_root: "../spatial-intelligence-data-factory-worktrees/"
    required_mapping:
      - "一个 Linear Issue / Story"
      - "一个 Agent owner"
      - "一个 Worktree"
      - "一个 branch"
      - "一个 PR"
    reserved_red_zone_files:
      - "AGENTS.md"
      - "docs/00_阅读指南.md"
      - "docs/02_总体架构/架构索引.md"
      - "docs/99_研发过程管理/文档分层索引.yaml"
      - "workpackage_schema/schemas/"
      - "migrations/versions/"
    mandatory_rules:
      - "Worktree 必须放在主仓外部，不得嵌套到主仓内部。"
      - "共享契约先合并，再允许下游 Lane 并行实现。"
      - "合并回 main 前必须同步主干并完成本 Lane 最小测试集。"
      - "output/、docs/.obsidian/workspace.json 和本地临时状态不得进入正式提交。"
  task_routing:
    stable_knowledge_change:
      description: "涉及正式产品、正式架构、正式工艺、正式组件、正式数据模型、正式运维、正式 AI 能力、正式测试方法的变更。"
      read_rings:
        - "ring0"
        - "ring1"
      write_targets:
        - "docs/01_产品与业务/"
        - "docs/02_总体架构/"
        - "docs/03_数据处理工艺/"
        - "docs/04_系统组件设计/"
        - "docs/05_数据模型设计/"
        - "docs/06_前端与交互设计/"
        - "docs/07_系统运行与运维/"
        - "docs/08_AI能力设计/"
        - "docs/09_测试与验收/"
        - "docs/10_研发与工程规范/"
        - "docs/11_附录/"
    process_change:
      description: "涉及主题说明、故事、冲刺、评审、规格融合、回填计划、整改 backlog 等当前研发推进材料。"
      read_rings:
        - "ring0"
        - "ring1"
        - "ring2"
      write_targets:
        - "docs/99_研发过程管理/"
        - "specs/"
        - ".specify/"
    evidence_or_history:
      description: "涉及验收结果、测试输出、回放记录、历史迁移、日志、生成产物和过程归档。"
      read_rings:
        - "ring0"
        - "ring1"
        - "ring2"
      write_targets:
        - "docs/99_研发过程管理/99_归档/"
        - "_bmad-output/"
        - "output/"
        - "archive/docs/"
        - "logs/"
  forbidden_write_targets:
    - "docs/product/"
    - "docs/architecture/"
    - "docs/testing/"
    - "docs/project-management/"
    - "docs/12_项目管理/"
    - "docs/研发过程管理/"
  post_task_obligations:
    - "若新增或迁移正式文档，必须同步更新 docs/00_阅读指南.md。"
    - "若新增或迁移正式架构文档，必须同步更新 docs/02_总体架构/架构索引.md。"
    - "若任务产物属于当前研发主题，必须同步更新 docs/99_研发过程管理/ 主题目录或项目级过程文件。"
    - "若产物只是过程证据或历史材料，必须写入 Ring3，不得伪装成正式文档。"
  promotion_gate:
    from_ring2_to_ring1:
      required_checks:
        - "结论已稳定，不再是单次主题临时口径。"
        - "至少一个 Ring1 正式章节已准备好承接。"
        - "原 Ring2 文件会保留过程痕迹，但不再与 Ring1 形成双正式版本。"
    from_ring3_to_higher_ring:
      required_checks:
        - "先由人工总结出长期有效结论。"
        - "经评审后再升级，不允许把证据原文直接提升为正式设计。"

rings:
  ring0:
    name: "全局约束层"
    role: "规定项目必须遵守的总入口、总原则和总规则。"
    key_question: "哪些规则全局强制生效？"
    change_frequency: "lowest"
    change_rule: "只能由正式修订更新，且不得被低 Ring 文档直接覆盖。"
  ring1:
    name: "正式真相源层"
    role: "描述系统当前正式设计、正式能力边界和长期有效知识。"
    key_question: "系统当前正式是什么？"
    change_frequency: "low"
    change_rule: "可以演进，但必须服从 Ring0。"
  ring2:
    name: "研发推进层"
    role: "描述当前主题、规格、故事、计划、评审和过程决策。"
    key_question: "当前迭代准备怎么做？"
    change_frequency: "medium_to_high"
    change_rule: "不得直接推翻 Ring0 或 Ring1；稳定后应升级。"
  ring3:
    name: "证据归档层"
    role: "保存历史资料、运行产物、验收结果、日志和过程证据。"
    key_question: "实际发生了什么？"
    change_frequency: "highest"
    change_rule: "不能反向定义正式设计，只能作为证据输入。"

classification_rules:
  - id: "must-follow"
    question: "这份文档是否定义全局必须遵守的规则或唯一入口？"
    assign_ring: "ring0"
  - id: "current-truth"
    question: "这份文档是否描述系统当前正式设计或长期稳定事实？"
    assign_ring: "ring1"
  - id: "current-planning"
    question: "这份文档是否主要服务当前主题、规格、故事、冲刺或评审推进？"
    assign_ring: "ring2"
  - id: "evidence-and-history"
    question: "这份文档是否主要记录历史、验收、输出、日志或回放证据？"
    assign_ring: "ring3"

directory_defaults:
  - path: "docs/01_产品与业务/"
    ring: "ring1"
    rationale: "正式产品与业务真相源。"
  - path: "docs/02_总体架构/"
    ring: "ring1"
    rationale: "正式架构真相源，个别入口文件例外提升到 Ring0。"
  - path: "docs/03_数据处理工艺/"
    ring: "ring1"
    rationale: "正式工艺设计与专题能力真相源。"
  - path: "docs/04_系统组件设计/"
    ring: "ring1"
    rationale: "正式组件边界、协议和设计说明。"
  - path: "docs/05_数据模型设计/"
    ring: "ring1"
    rationale: "正式数据模型真相源。"
  - path: "docs/06_前端与交互设计/"
    ring: "ring1"
    rationale: "正式页面与交互设计真相源。"
  - path: "docs/07_系统运行与运维/"
    ring: "ring1"
    rationale: "正式运维与运行设计真相源。"
  - path: "docs/08_AI能力设计/"
    ring: "ring1"
    rationale: "正式 AI 能力设计真相源。"
  - path: "docs/09_测试与验收/"
    ring: "ring1"
    rationale: "正式测试设计与验收方法。"
  - path: "docs/10_研发与工程规范/"
    ring: "ring1"
    rationale: "正式工程规范真相源，个别总规则文件例外提升到 Ring0。"
  - path: "docs/11_附录/"
    ring: "ring1"
    rationale: "术语、迁移说明、演进记录等长期参考。"
  - path: "docs/99_研发过程管理/99_归档/"
    ring: "ring3"
    rationale: "合并后的过程归档目录，保存历史项目管理与历史研发主题材料。"
  - path: "docs/99_研发过程管理/"
    ring: "ring2"
    rationale: "项目整合后的过程管理主目录，承接项目管理、主题推进和规格治理。"
  - path: "specs/"
    ring: "ring2"
    rationale: "SpecKit feature 级规格过程区。"
  - path: ".specify/"
    ring: "ring2"
    rationale: "SpecKit 模板与工作流容器，个别宪章文件例外提升到 Ring0。"
  - path: "_bmad-output/"
    ring: "ring3"
    rationale: "BMAD 过程产物与证据。"
  - path: "output/"
    ring: "ring3"
    rationale: "运行输出、验收结果和看板数据。"
  - path: "archive/docs/"
    ring: "ring3"
    rationale: "历史正式文档和归档资料。"
  - path: "logs/"
    ring: "ring3"
    rationale: "日志与日常记录。"

