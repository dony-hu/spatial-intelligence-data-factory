    ring: "ring0"
    rationale: "项目级最高规则入口。"
  - path: "docs/00_阅读指南.md"
    ring: "ring0"
    rationale: "文档总入口。"
  - path: "docs/02_总体架构/架构索引.md"
    ring: "ring0"
    rationale: "架构真相源入口。"
  - path: "docs/02_总体架构/核心设计原则.md"
    ring: "ring0"
    rationale: "系统全局设计原则。"
  - path: "docs/10_研发与工程规范/项目目录结构.md"
    ring: "ring0"
    rationale: "文档与代码目录归口规则。"
  - path: "docs/10_研发与工程规范/多Agent与多Worktree并行开发规范.md"
    ring: "ring0"
    rationale: "多 Agent / 多 Worktree 并行开发的项目级协作规则。"
  - path: "docs/10_研发与工程规范/数据治理规范.md"
    ring: "ring0"
    rationale: "数据工厂的全局治理约束。"
  - path: "docs/99_研发过程管理/文档分层索引.yaml"
    ring: "ring0"
    rationale: "文档 Ring 分层总规则。"
  - path: "docs/99_研发过程管理/99_归档/截止2026-03-05/项目管理/版本说明.md"
    ring: "ring3"
    rationale: "项目管理并入前的历史发布说明与过程证据。"
  - path: ".specify/memory/constitution.md"
    ring: "ring0"
    rationale: "SpecKit 在本项目中的全局宪章。"
    status: "pending_backfill"

planned_document_inheritance:
  - path_pattern: "docs/01_产品与业务/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/02_总体架构/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/03_数据处理工艺/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/04_系统组件设计/**/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/05_数据模型设计/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/06_前端与交互设计/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/07_系统运行与运维/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/08_AI能力设计/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/09_测试与验收/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/10_研发与工程规范/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/11_附录/*.md"
    inherit_ring: "ring1"
  - path_pattern: "docs/99_研发过程管理/99_归档/**/*"
    inherit_ring: "ring3"
  - path_pattern: "docs/99_研发过程管理/**/*.md"
    inherit_ring: "ring2"
  - path_pattern: "specs/**/*"
    inherit_ring: "ring2"

promotion_rules:
  ring2_to_ring1:
    when:
      - "内容已稳定，不再只是当前迭代计划。"
      - "会被多个主题、多个 Story 或多个实现反复引用。"
      - "已经形成明确边界、正式术语和验收口径。"
    action: "将稳定内容收敛到 docs 编号目录，原过程文档保留引用关系。"
  ring1_to_ring0:
    when:
      - "文档已成为全局总规则、总入口或总章程。"
      - "低 Ring 文档必须统一服从该文件。"
    action: "正式提升为全局治理文件，并明确唯一入口角色。"
  ring3_to_ring1_or_ring2:
    when:
      - "证据中暴露了长期有效的设计结论。"
    action: "先经人工总结与评审，再升级为 Ring1 或 Ring2；禁止直接复制粘贴上升。"

conflict_resolution:
  priority_order:
    - "ring0"
    - "ring1"
    - "ring2"
    - "ring3"
  rules:
    - "低 Ring 文档与高 Ring 文档冲突时，以高 Ring 为准。"
    - "Ring2/3 发现现行 Ring0/1 不再适用时，应发起修订，不得自行改口。"
    - "同一份长期知识不能在两个 Ring 中维护两个正式版本。"

framework_positioning:
  bmad:
    primary_ring: "ring2"
    special_cases:
      - path: "_bmad-output/"
        ring: "ring3"
      - path: "docs/99_研发过程管理/02_BMAD/"
        ring: "ring2"
    note: "BMAD 负责主题、Story、冲刺、评审推进，稳定产物升级回 Ring1。"
  speckit:
    primary_ring: "ring2"
    special_cases:
      - path: ".specify/memory/constitution.md"
        ring: "ring0"
      - path: "specs/"
        ring: "ring2"
      - path: "docs/99_研发过程管理/03_SpecKit/"
        ring: "ring2"
    note: "SpecKit 负责 feature 级规格，下沉在 Ring2，宪章属于 Ring0。"

