version: "v1"
framework: "speckit"
status: "active"
initialized_at: "2026-03-06"
scope: "feature"
canonical_sources:
  docs_entry: "docs/00_阅读指南.md"
  architecture_entry: "docs/02_总体架构/架构索引.md"
  doc_tiering_index: "docs/99_研发过程管理/文档分层索引.yaml"
  principles: "docs/02_总体架构/核心设计原则.md"
  project_structure: "docs/10_研发与工程规范/项目目录结构.md"
  data_governance: "docs/10_研发与工程规范/数据治理规范.md"
  glossary: "docs/11_附录/术语表.md"
  e2e_testing: "docs/09_测试与验收/全链路测试设计.md"
  fusion_report: "docs/99_研发过程管理/01_规格融合/报告.md"
  fusion_status: "docs/99_研发过程管理/01_规格融合/状态.yaml"
  repo_policy: "AGENTS.md"
working_roots:
  specify_root: ".specify/"
  feature_root: "specs/"
  baseline_readme: "specs/README.md"
constitution_seed:
  status: "pending_sync"
  target_file: ".specify/memory/constitution.md"
  source_documents:
    - "AGENTS.md"
    - "docs/02_总体架构/核心设计原则.md"
    - "docs/10_研发与工程规范/项目目录结构.md"
    - "docs/10_研发与工程规范/数据治理规范.md"
    - "docs/11_附录/术语表.md"
    - "docs/09_测试与验收/全链路测试设计.md"
feature_artifacts:
  root_pattern: "specs/<feature-id>/"
  required_files:
    - "spec.md"
    - "plan.md"
    - "tasks.md"
  optional_files:
    - "research.md"
    - "data-model.md"
    - "contracts/"
binding_to_bmad:
  required_metadata:
    - "bmad_theme"
    - "bmad_story_id"
    - "canonical_docs"
    - "acceptance_path"
    - "promotion_targets"
  story_targets:
    - "docs/99_研发过程管理/<主题>/故事/*.md"
  planning_targets:
    - "docs/99_研发过程管理/冲刺计划.md"
promotion_mapping:
  research:
    targets:
      - "docs/02_总体架构/"
      - "docs/03_数据处理工艺/"
      - "docs/04_系统组件设计/"
      - "docs/07_系统运行与运维/"
      - "docs/08_AI能力设计/"
  data_model:
    targets:
      - "docs/05_数据模型设计/"
  contracts:
    targets:
      - "contracts/"
      - "schemas/"
      - "docs/04_系统组件设计/02_工作包协议/"
  engineering_rules:
    targets:
      - "docs/10_研发与工程规范/"
planned_docs:
  primary_owner:
    - path: "docs/03_数据处理工艺/地址标准化工艺.md"
      recommended_feature: "address-normalization"
      status: "planned"
    - path: "docs/03_数据处理工艺/地址真实性核验工艺.md"
      recommended_feature: "address-trust-verification"
      status: "planned"
    - path: "docs/03_数据处理工艺/空间实体治理工艺.md"
      recommended_feature: "spatial-entity-governance"
      status: "planned"
    - path: "docs/03_数据处理工艺/多源数据融合工艺.md"
      recommended_feature: "multi-source-fusion"
      status: "planned"
    - path: "docs/08_AI能力设计/检索与召回机制.md"
      recommended_feature: "retrieval-and-recall"
      status: "planned"
    - path: "docs/08_AI能力设计/推理与排序策略.md"
      recommended_feature: "reasoning-and-ranking"
      status: "planned"
    - path: "docs/08_AI能力设计/模型评估机制.md"
      recommended_feature: "model-evaluation"
      status: "planned"
handoff_back_to_bmad:
  done_signals:
    - "spec.md 已完成范围澄清"
    - "tasks.md 已可执行"
    - "数据模型或契约已绑定正式回填目标"
  update_targets:
    - "docs/99_研发过程管理/<主题>/主题说明.md"
    - "docs/99_研发过程管理/<主题>/故事/*.md"
    - "docs/99_研发过程管理/冲刺计划.md"
governance:
  single_truth_rule: "specs/ 保留 feature 过程规格，稳定知识回填 docs 正式目录。"
  no_dual_write_rule: "同一份长期知识不能同时在 specs/ 和 docs/ 维护两个正式版本。"
  routing_rule: "SpecKit 任务在写 specs/、docs/ 或过程主题目录前，必须先服从 AGENTS.md 与 docs/99_研发过程管理/文档分层索引.yaml 的路由规则。"
