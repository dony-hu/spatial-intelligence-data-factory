services:
  postgres:
    image: postgres:15
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: si_factory_user
      POSTGRES_PASSWORD: SiFactory2026
      POSTGRES_DB: si_factory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
